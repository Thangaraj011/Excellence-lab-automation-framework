stages:
  - test
  - report
  - deploy

playwright-test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0
  timeout: 60 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  script:
    - npm ci
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 30 days

allure-report:
  stage: report
  image: mcr.microsoft.com/playwright:v1.609.0
  dependencies:
    - playwright-test
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: always
  script:
    - npx allure generate allure-results --clean
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 30 days

pages:
  stage: deploy
  image: alpine:latest
  dependencies:
    - allure-report
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: always
  script:
    - mkdir -p public
    - cp -r allure-report/* public/
  artifacts:
    paths:
      - public
